<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIBE & CO. | Premium Companionship</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        [x-cloak] { display: none !important; }
        body { font-family: 'Inter', sans-serif; background-color: #0a0e14; color: #e5e7eb; }
        .serif { font-family: 'Playfair Display', serif; }
        .gold-gradient { background: linear-gradient(135deg, #c5a059 0%, #f1d392 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .status-pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); } 70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(34, 197, 94, 0); } 100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); } }
        .fade-in { animation: fadeIn 1.5s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>

<body x-data="{ 
    bookingModal: false, 
    successModal: false, 
    authModal: false, 
    authMode: 'login',
    ngfTag: '', 
    alias: '', 
    contact: '', 
    notes: '',
    email: '',
    password: '',
    authMessage: ''
}">

    <nav class="flex justify-between items-center px-10 py-6 sticky top-0 bg-[#0a0e14]/80 backdrop-blur-xl z-50 border-b border-white/5">
        <div class="serif text-2xl font-bold tracking-[0.2em]">VIBE<span class="text-[#c5a059] italic">&</span>CO.</div>
        <div class="flex gap-6 items-center">
            <button @click="authModal = true" class="text-gray-400 text-[10px] uppercase tracking-[0.3em] hover:text-[#c5a059] transition-all">Member Login</button>
            <button @click="bookingModal = true" class="bg-gradient-to-r from-[#c5a059] to-[#f1d392] text-black px-6 py-2 rounded-full text-[10px] font-bold uppercase tracking-widest">Inquire for Availability</button>
        </div>
    </nav>

    <section class="relative h-[85vh] flex items-center justify-center text-center px-6 fade-in">
        <div class="relative z-10 max-w-4xl">
            <h1 class="serif text-6xl md:text-8xl text-white tracking-tighter mb-6 flex items-center justify-center">
                VIBE & CO. <span class="text-[#c5a059] mx-2">|</span> Private Concierge
                <span class="flex h-3 w-3 ml-4">
                    <span class="animate-ping absolute inline-flex h-3 w-3 rounded-full bg-green-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-3 w-3 bg-green-500"></span>
                </span>
            </h1>
            <p class="text-gray-400 text-sm md:text-lg tracking-[0.3em] uppercase mb-10 leading-relaxed">
                Curated companionship for the modern elite. <br>
                <span class="text-[#c5a059] italic lowercase font-serif normal-case text-xl tracking-normal">Discretion is our highest currency.</span>
            </p>
            <button @click="bookingModal = true" class="border border-[#c5a059] text-[#c5a059] px-12 py-4 rounded-full font-bold tracking-widest uppercase hover:bg-[#c5a059] hover:text-black transition-all duration-500 active:scale-95">
                Request Private Access
            </button>
        </div>
    </section>

    <section class="py-20 px-10 max-w-7xl mx-auto grid md:grid-cols-3 gap-10">
        <template x-for="item in [
            { name: 'Date Companion', type: 'Social Excellence', details: 'Need a handsome date for a party, wedding, or dinner? Our companions are smart, tall, and great talkers designed to elevate your social presence.', img: 'https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?q=80&w=800&auto=format&fit=crop' },
            { name: 'Home Wellness', type: 'Private Sanctuary', details: 'Professional full body massage therapy at your place. We focus on relaxation and feeling good to ensure you are at your absolute best.', img: 'https://images.unsplash.com/photo-1544161515-4ab6ce6db874?q=80&w=800&auto=format&fit=crop' },
            { name: 'Toy Boy Services', type: 'High Energy', details: 'Looking for a more energetic experience? We offer young, fit, and athletic Indian men available for clubbing, private companionship, or lively group dance performances—perfect for bachelor celebrations and fun, high-spirited entertainment.', img: 'https://images.unsplash.com/photo-1492562080023-ab3db95bfbce?q=80&w=800&auto=format&fit=crop' }
        ]">
            <div class="glass rounded-[2rem] overflow-hidden group fade-in">
                <div class="h-96 relative overflow-hidden">
                    <img :src="item.img" class="w-full h-full object-cover grayscale group-hover:grayscale-0 transition-all duration-700">
                    <div class="absolute top-4 right-4 bg-green-500 w-2 h-2 rounded-full status-pulse"></div>
                </div>
                <div class="p-8 text-center">
                    <span class="text-[10px] text-[#c5a059] font-bold uppercase tracking-[0.2em]" x-text="item.type"></span>
                    <h3 class="serif text-2xl text-white mt-2 mb-4" x-text="item.name"></h3>
                    <p class="text-gray-400 text-[11px] leading-relaxed mb-6 font-light px-2 min-h-[60px]" x-text="item.details"></p>
                    <button @click="bookingModal = true" class="w-full py-3 bg-white/5 hover:bg-white/10 rounded-xl text-[10px] font-bold uppercase tracking-widest">Inquire Availability</button>
                </div>
            </div>
        </template>
    </section>

    <!-- BOOKING MODAL -->
    <div x-show="bookingModal" x-cloak class="fixed inset-0 z-[100] flex items-center justify-center p-6 bg-black/90 backdrop-blur-sm">
        <div @click.away="bookingModal = false" class="glass max-w-md w-full p-10 rounded-[3rem] text-center">
            <h2 class="serif text-3xl mb-6 text-white">Secure <span class="italic">Inquiry</span></h2>
            <p class="text-[10px] text-gray-500 uppercase tracking-widest mb-6">256-Bit SSL Encrypted Session</p>
            <div class="space-y-4">
                <div class="relative"><span class="absolute inset-y-0 left-4 flex items-center text-gray-500">🔒</span><input x-model="alias" type="text" placeholder="Alias (e.g. Tiger, Guest01)" class="w-full bg-white/5 border border-white/10 rounded-xl pl-10 pr-6 py-4 text-white outline-none focus:border-[#c5a059]"></div>
                <div class="relative"><span class="absolute inset-y-0 left-4 flex items-center text-gray-500">🔒</span><input x-model="contact" type="text" placeholder="Secure WhatsApp / Telegram" class="w-full bg-white/5 border border-white/10 rounded-xl pl-10 pr-6 py-4 text-white outline-none focus:border-[#c5a059]"></div>
                <div class="relative"><span class="absolute top-4 left-4 text-gray-500">🔒</span><textarea x-model="notes" placeholder="Curation Notes" class="w-full bg-white/5 border border-white/10 rounded-xl pl-10 pr-6 py-4 text-white outline-none focus:border-[#c5a059] h-24 resize-none"></textarea></div>
                <button @click="fetch('/api/reserve', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ alias, contact, notes }) }).then(res => res.json()).then(data => { ngfTag = data.tag; bookingModal = false; successModal = true; })" class="w-full py-5 bg-gradient-to-r from-[#c5a059] to-[#f1d392] text-black font-bold rounded-xl uppercase tracking-widest text-xs">Initialize Encrypted Pass</button>
            </div>
        </div>
    </div>

    <!-- INNER CIRCLE AUTH MODAL (FIXED REDIRECT) -->
    <div x-show="authModal" x-cloak class="fixed inset-0 z-[120] flex items-center justify-center p-6 bg-black/95 backdrop-blur-md">
        <div @click.away="authModal = false" class="glass max-w-md w-full p-10 rounded-[3rem] text-center border border-[#c5a059]/20">
            <div class="mb-8">
                <h2 class="serif text-3xl text-white" x-text="authMode === 'login' ? 'Inner Circle' : 'Request Access'"></h2>
                <p class="text-[10px] text-gray-500 uppercase tracking-widest mt-2" x-text="authMode === 'login' ? 'Enter the Member Vault' : 'Elite Curation Protocol'"></p>
            </div>
            <div class="space-y-4">
                <div class="relative"><span class="absolute inset-y-0 left-4 flex items-center text-gray-500 text-xs">✉️</span><input x-model="email" type="email" placeholder="Concierge Email" class="w-full bg-white/5 border border-white/10 rounded-xl pl-10 pr-6 py-4 text-white outline-none focus:border-[#c5a059]"></div>
                <div class="relative"><span class="absolute inset-y-0 left-4 flex items-center text-gray-500 text-xs">🔑</span><input x-model="password" type="password" placeholder="Vault Key" class="w-full bg-white/5 border border-white/10 rounded-xl pl-10 pr-6 py-4 text-white outline-none focus:border-[#c5a059]"></div>
                <p x-show="authMessage" class="text-[#c5a059] text-[11px] italic" x-text="authMessage"></p>
                <button @click="
                    const path = authMode === 'login' ? '/api/login' : '/api/signup';
                    fetch(path, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email, password }) })
                    .then(res => res.json())
                    .then(data => {
                        authMessage = data.message;
                        if(data.success && authMode === 'login') {
                            authMessage = 'Access Granted. Opening Vault...';
                            setTimeout(() => { window.location.href = '/vault-access'; }, 1500);
                        }
                    })
                " class="w-full py-5 bg-gradient-to-r from-[#c5a059] to-[#f1d392] text-black font-bold rounded-xl uppercase tracking-widest text-xs" x-text="authMode === 'login' ? 'Access Vault' : 'Submit Request'"></button>
                <button @click="authMode = (authMode === 'login' ? 'signup' : 'login'); authMessage = ''" class="text-gray-500 text-[10px] uppercase tracking-widest mt-4 hover:text-white transition">
                    <span x-text="authMode === 'login' ? 'Need to request access?' : 'Already a member? Login'"></span>
                </button>
            </div>
        </div>
    </div>

    <!-- SUCCESS MODAL -->
    <div x-show="successModal" x-cloak class="fixed inset-0 z-[110] flex items-center justify-center p-6 backdrop-blur-md bg-black/80">
        <div @click.away="successModal = false" class="glass max-w-sm w-full p-10 rounded-[2rem] border border-[#c5a059]/30 text-center relative overflow-hidden">
            <div class="relative z-10">
                <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-[#c5a059]/10 mb-6">
                    <svg class="w-8 h-8 text-[#c5a059]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M5 13l4 4L19 7"></path></svg>
                </div>
                <h2 class="serif text-2xl text-white mb-3">Protocol Initialized</h2>
                <h1 class="serif text-4xl text-white tracking-tighter mb-8" x-text="ngfTag"></h1>
                <a :href="'https://wa.me/918505976531?text=Hi%20Vibe%20%26%20Co%2C%20My%20Tag%20is%3A%20' + ngfTag" target="_blank" class="w-full py-4 mb-4 bg-[#25D366] text-white font-bold rounded-xl text-center flex items-center justify-center gap-2">VERIFY ON WHATSAPP</a>
                <button @click="successModal = false" class="w-full py-4 bg-white/5 text-white font-bold rounded-xl text-center uppercase tracking-widest text-xs">Exit Protocol</button>
            </div>
        </div>
    </div>

    <footer class="py-20 text-center border-t border-white/5 mt-20 fade-in">
        <p class="text-gray-500 text-[10px] uppercase tracking-[0.3em] font-bold">&copy; 2026 VIBE & CO. | All Rights Reserved</p>
    </footer>
</body>
</html>
