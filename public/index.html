<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIBE & CO. | Premium Companionship</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        [x-cloak] { display: none !important; }
        body { font-family: 'Inter', sans-serif; background-color: #0a0e14; color: #e5e7eb; }
        .serif { font-family: 'Playfair Display', serif; }
        .gold-gradient { background: linear-gradient(135deg, #c5a059 0%, #f1d392 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .status-pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); } 70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(34, 197, 94, 0); } 100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); } }
    </style>
</head>
<body x-data="{ bookingModal: false, successModal: false, ngfTag: '', alias: '', contact: '' }">

    <nav class="flex justify-between items-center px-10 py-6 sticky top-0 bg-[#0a0e14]/80 backdrop-blur-xl z-50 border-b border-white/5">
        <div class="serif text-2xl font-bold tracking-[0.2em]">VIBE<span class="text-[#c5a059] italic">&</span>CO.</div>
        <button @click="bookingModal = true" class="bg-gradient-to-r from-[#c5a059] to-[#f1d392] text-black px-6 py-2 rounded-full text-[10px] font-bold uppercase tracking-widest">Reserve Entry</button>
    </nav>

    <section class="relative h-[80vh] flex items-center justify-center text-center px-6">
        <div class="relative z-10 max-w-4xl">
            <h1 class="serif text-6xl md:text-8xl mb-6">Chemistry <span class="italic gold-gradient">First.</span></h1>
            <p class="text-gray-400 text-sm tracking-widest uppercase mb-10">Premium Companionship • No Prepayment • NGF Secure</p>
            <button @click="bookingModal = true" class="border border-[#c5a059] text-[#c5a059] px-12 py-4 rounded-full font-bold uppercase tracking-widest hover:bg-[#c5a059] hover:text-black transition-all">Explore the Collection</button>
        </div>
    </section>

    <section class="py-20 px-10 max-w-7xl mx-auto grid md:grid-cols-3 gap-10">
        <template x-for="item in [
            {name: 'The Sophisticate', type: 'Elite Date', img: 'https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=800'},
            {name: 'The Healer', type: 'Wellness', img: 'https://images.unsplash.com/photo-1540555700478-4be289fbecee?w=800'},
            {name: 'The Vibe-Setter', type: 'Toy Boy', img: 'https://images.unsplash.com/photo-1492562080023-ab3db95bfbce?w=800'}
        ]">
            <div class="glass rounded-[2rem] overflow-hidden group">
                <div class="h-96 relative overflow-hidden">
                    <img :src="item.img" class="w-full h-full object-cover grayscale group-hover:grayscale-0 transition-all duration-700">
                    <div class="absolute top-4 right-4 bg-green-500 w-2 h-2 rounded-full status-pulse"></div>
                </div>
                <div class="p-8 text-center">
                    <span class="text-[10px] text-[#c5a059] font-bold uppercase tracking-[0.2em]" x-text="item.type"></span>
                    <h3 class="serif text-2xl text-white mt-2 mb-4" x-text="item.name"></h3>
                    <button @click="bookingModal = true" class="w-full py-3 bg-white/5 hover:bg-white/10 rounded-xl text-[10px] font-bold uppercase tracking-widest">Reserve Vibe Check</button>
                </div>
            </div>
        </template>
    </section>

    <div x-show="bookingModal" x-cloak class="fixed inset-0 z-[100] flex items-center justify-center p-6 bg-black/90 backdrop-blur-sm">
        <div @click.away="bookingModal = false" class="glass max-w-md w-full p-10 rounded-[3rem] text-center">
            <h2 class="serif text-3xl mb-6 text-white">Request <span class="italic">Identity</span></h2>
            <div class="space-y-4">
                <input x-model="alias" type="text" placeholder="Alias (Your Name)" class="w-full bg-white/5 border border-white/10 rounded-xl px-6 py-4 text-white outline-none focus:border-[#c5a059]">
                <input x-model="contact" type="text" placeholder="WhatsApp / Telegram" class="w-full bg-white/5 border border-white/10 rounded-xl px-6 py-4 text-white outline-none focus:border-[#c5a059]">
                <button @click="
                    fetch('/api/reserve', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ alias, contact })
                    })
                    .then(res => res.json())
                    .then(data => {
                        ngfTag = data.tag;
                        bookingModal = false;
                        successModal = true;
                    })
                " class="w-full py-5 bg-gradient-to-r from-[#c5a059] to-[#f1d392] text-black font-bold rounded-xl uppercase tracking-widest text-xs">Generate NGF Pass</button>
            </div>
        </div>
    </div>

    <div x-show="successModal" x-cloak class="fixed inset-0 z-[200] flex items-center justify-center p-6 bg-[#0a0e14]">
        <div class="glass max-w-sm w-full p-10 rounded-[3rem] text-center border-[#c5a059]/50">
            <h2 class="serif text-2xl mb-2 text-white">Secure Pass Active</h2>
            <div class="bg-white/5 border border-dashed border-[#c5a059]/40 py-8 rounded-2xl my-8">
                <p class="text-[9px] uppercase tracking-widest text-gray-500 mb-2">Your Private NGF Tag</p>
                <h1 class="serif text-5xl font-bold text-white tracking-tighter" x-text="ngfTag"></h1>
            </div>
<a :href="'https://wa.me/918505976531?text=Hi Vibe %26 Co, I just reserved an entry. My Tag is: ' + ngfTag" 
   target="_blank" 
   class="w-full py-4 mb-4 bg-[#25D366] text-white font-bold rounded-xl text-center flex items-center justify-center gap-2 transition-transform active:scale-95">
    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 16 16">
        <path d="M13.601 2.326A7.854 7.854 0 0 0 7.994 0C3.627 0 .068 3.558.064 7.926c0 1.399.366 2.76 1.057 3.965L0 16l4.204-1.102a7.933 7.933 0 0 0 3.79.965h.004c4.368 0 7.926-3.558 7.93-7.93A7.898 7.898 0 0 0 13.6 2.326zM7.994 14.521a6.573 6.573 0 0 1-3.356-.92l-.24-.144-2.494.654.666-2.433-.156-.251a6.56 6.56 0 0 1-1.007-3.505c0-3.626 2.957-6.584 6.591-6.584a6.56 6.56 0 0 1 4.66 1.931 6.557 6.557 0 0 1 1.928 4.66c-.004 3.639-2.961 6.592-6.592 6.592zm3.615-4.934c-.197-.099-1.17-.578-1.353-.646-.182-.065-.315-.099-.445.099-.133.197-.513.646-.627.775-.114.133-.232.148-.43.05-.197-.1-.836-.308-1.592-.985-.59-.525-.985-1.175-1.103-1.372-.114-.198-.011-.304.088-.403.087-.088.197-.232.296-.346.1-.114.133-.198.198-.33.065-.134.034-.248-.015-.347-.05-.099-.445-1.076-.612-1.47-.16-.389-.323-.335-.445-.34-.114-.007-.247-.007-.38-.007a.729.729 0 0 0-.529.247c-.182.198-.691.677-.691 1.654 0 .977.71 1.916.81 2.049.098.133 1.394 2.132 3.383 2.992.47.205.84.326 1.129.418.475.152.904.129 1.246.08.38-.058 1.171-.48 1.338-.943.164-.464.164-.86.114-.943-.049-.084-.182-.133-.38-.232z"/>
    </svg>
    VERIFY ON WHATSAPP
</a>
            <button @click="successModal = false" class="w-full py-4 bg-white/5 text-white rounded-xl text-[10px] font-bold uppercase tracking-widest">Done</button>
        </div>
    </div>

</body>
</html>
