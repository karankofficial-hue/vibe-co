<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIBE & CO. | The Private Roster</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        [x-cloak] { display: none !important; }
        body { font-family: 'Inter', sans-serif; background-color: #0a0e14; color: #e5e7eb; }
        .serif { font-family: 'Playfair Display', serif; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .fade-in { animation: fadeIn 1.5s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body x-data="{ companions: [] }" x-init="fetch('/api/companions').then(res => res.json()).then(data => companions = data)">

    <nav class="flex justify-between items-center px-10 py-6 sticky top-0 bg-[#0a0e14]/80 backdrop-blur-xl z-50 border-b border-white/5">
        <div class="serif text-2xl font-bold tracking-[0.2em]">VIBE<span class="text-[#c5a059] italic">&</span>CO.</div>
        <a href="/" class="text-gray-400 text-[10px] uppercase tracking-widest hover:text-[#c5a059] transition">Exit Vault</a>
    </nav>

    <header class="py-20 text-center fade-in">
        <h1 class="serif text-5xl text-white mb-4">The <span class="italic text-[#c5a059]">Elite</span> Roster</h1>
        <p class="text-gray-500 text-[10px] uppercase tracking-[0.4em]">Hand-selected companions for your selection</p>
    </header>

    <section class="pb-24 px-10 max-w-7xl mx-auto grid md:grid-cols-3 gap-10">
        <template x-for="boy in companions">
            <div class="glass rounded-[2rem] overflow-hidden group fade-in">
                <div class="h-[450px] relative overflow-hidden">
                    <img :src="boy.imageUrl" class="w-full h-full object-cover transition-all duration-700 group-hover:scale-110">
                    <div class="absolute bottom-0 left-0 right-0 p-8 bg-gradient-to-t from-black/90 to-transparent">
                        <span class="text-[10px] text-[#c5a059] font-bold uppercase tracking-widest" x-text="boy.specialty"></span>
                        <h3 class="serif text-3xl text-white mt-1" x-text="boy.name"></h3>
                    </div>
                </div>
                <div class="p-8 space-y-4">
                    <div class="flex justify-between text-[11px] text-gray-400 uppercase tracking-widest border-b border-white/5 pb-4">
                        <span>Age: <span class="text-white" x-text="boy.age"></span></span>
                        <span>Height: <span class="text-white" x-text="boy.height"></span></span>
                    </div>
                    <!-- UPDATED BUTTON LOGIC -->
                    <button @click="window.location.href='/?booking=' + boy.name" 
                            class="w-full py-4 bg-white/5 hover:bg-[#c5a059] hover:text-black rounded-xl text-[10px] font-bold uppercase tracking-widest transition-all duration-500">
                        Request Selection
                    </button>
                </div>
            </div>
        </template>
    </section>

</body>
</html>
